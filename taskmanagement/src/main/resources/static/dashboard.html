<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">TMS</div>

        <nav>
            <a href="tasks.html" class="task-btn">Tasks</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
            <button id="themeToggle" class="theme-btn">🌙</button>
            <script>

                function logout() {
                    localStorage.removeItem("user");
                    window.location.href = "login.html";
                }

            </script>
        </nav>
    </header>
    <main>
        <section class="dashboard">

            <h1>Dashboard</h1>

            <div class="stats">

                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <p id="totalTasks">0</p>
                </div>

                <div class="stat-card">
                    <h3>In Progress</h3>
                    <p id="progressCount">0</p>
                </div>

                <div class="stat-card">
                    <h3>Completed</h3>
                    <p id="doneCount">0</p>
                </div>

            </div>

            <div class="board">

                <div class="column">
                    <h3>To Do</h3>
                    <div id="todoList"></div>
                </div>

                <div class="column">
                    <h3>In Progress</h3>
                    <div id="progressList"></div>
                </div>

                <div class="column">
                    <h3>Completed</h3>
                    <div id="doneList"></div>
                </div>

            </div>

        </section>

    </main>
    <footer class="footer">
        <p class="copyright">
            © 2026 Abhishek. All rights reserved.
        </p>
    </footer>
</body>

</html>
<script>

    const user = localStorage.getItem("user");

    if (!user) {
        window.location.href = "login.html";
    }

</script>
<script>

    const toggleBtn = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggleBtn.textContent = "☀️";
    }

    toggleBtn.onclick = () => {

        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
            toggleBtn.textContent = "☀️";
        } else {
            localStorage.setItem("theme", "light");
            toggleBtn.textContent = "🌙";
        }

    };

</script>
<script>

    async function loadDashboardTasks() {

        const user = JSON.parse(localStorage.getItem("user"));

        const res = await fetch(`http://localhost:8080/api/tasks/user/${user.id}`);
        const tasks = await res.json();

        document.getElementById("todoList").innerHTML = "";
        document.getElementById("progressList").innerHTML = "";
        document.getElementById("doneList").innerHTML = "";

        let total = 0;
        let progress = 0;
        let done = 0;

        tasks.forEach(task => {

            total++;

            const div = document.createElement("div");
            div.className = "task";

            div.innerHTML = `
<h4>${task.title}</h4>
<p class="deadline">${task.deadline ?? ""}</p>
<span class="priority">${task.priority ?? ""}</span>
`;

            if (task.status === "TODO") {
                document.getElementById("todoList").appendChild(div);
            }

            if (task.status === "IN_PROGRESS") {
                progress++;
                document.getElementById("progressList").appendChild(div);
            }

            if (task.status === "DONE") {
                done++;
                document.getElementById("doneList").appendChild(div);
            }

        });

        document.getElementById("totalTasks").innerText = total;
        document.getElementById("progressCount").innerText = progress;
        document.getElementById("doneCount").innerText = done;

    }

    loadDashboardTasks();


</script>
